services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://perkins:perkins@postgres:5432/perkins
      - AUTH_SECRET=${AUTH_SECRET:-dev-insecure-secret-change-me}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=perkins
      - POSTGRES_PASSWORD=perkins
      - POSTGRES_DB=perkins
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perkins"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
